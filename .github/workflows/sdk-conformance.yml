name: SDK Conformance

on:
  pull_request:
    paths:
      - "packages/sdk-spec/conformance/**"
      - "packages/sdk-spec/spec/capabilities.yaml"
      - "packages/sdk-spec/spec/conformance.yaml"
      - "packages/ts-sdk/**"
      - "packages/python-sdk/**"
      - "packages/rust-sdk/**"
      - "packages/elixir-sdk/**"
      - ".github/workflows/sdk-conformance.yml"
  push:
    branches: [main]
    paths:
      - "packages/sdk-spec/conformance/**"
      - "packages/sdk-spec/spec/capabilities.yaml"
      - "packages/sdk-spec/spec/conformance.yaml"
      - "packages/ts-sdk/**"
      - "packages/python-sdk/**"
      - "packages/rust-sdk/**"
      - "packages/elixir-sdk/**"
      - ".github/workflows/sdk-conformance.yml"

jobs:
  typescript-conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/ts-sdk/package-lock.json

      - run: npm ci
        working-directory: packages/ts-sdk

      - run: npm run test:treedb-conformance
        working-directory: packages/ts-sdk

  python-conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/python-sdk/pyproject.toml

      - run: python -m pip install --upgrade pip
        working-directory: packages/python-sdk

      - run: python -m pip install -e ".[dev]"
        working-directory: packages/python-sdk

      - run: python -m pytest tests/conformance
        working-directory: packages/python-sdk

  rust-conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo test
        working-directory: packages/rust-sdk

  elixir-conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17.3"

      - run: mix deps.get
        working-directory: packages/elixir-sdk

      - run: mix test test/conformance
        working-directory: packages/elixir-sdk
