name: SDK Integration

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Optional TreeDB base URL. Defaults to TREEDB_SDK_BASE_URL secret if blank.
        required: false
        type: string
  pull_request:
    paths:
      - "packages/ts-sdk/**"
      - "packages/python-sdk/**"
      - "packages/rust-sdk/**"
      - "packages/elixir-sdk/**"
      - ".github/workflows/sdk-integration.yml"
  push:
    branches: [main]
    paths:
      - "packages/ts-sdk/**"
      - "packages/python-sdk/**"
      - "packages/rust-sdk/**"
      - "packages/elixir-sdk/**"
      - ".github/workflows/sdk-integration.yml"

env:
  TREEDB_BASE_URL: ${{ inputs.base_url || secrets.TREEDB_SDK_BASE_URL }}
  TREEDB_TOKEN: ${{ secrets.TREEDB_SDK_TOKEN }}

jobs:
  typescript-integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/ts-sdk/package-lock.json

      - run: npm ci
        working-directory: packages/ts-sdk

      - run: npm run test:treedb-integration
        working-directory: packages/ts-sdk

  python-integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/python-sdk/pyproject.toml

      - run: python -m pip install --upgrade pip
        working-directory: packages/python-sdk

      - run: python -m pip install -e ".[dev]"
        working-directory: packages/python-sdk

      - run: python -m pytest tests/integration
        working-directory: packages/python-sdk

  rust-integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo test integration_live_api
        working-directory: packages/rust-sdk

  elixir-integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17.3"

      - run: mix deps.get
        working-directory: packages/elixir-sdk

      - run: mix test test/integration
        working-directory: packages/elixir-sdk
