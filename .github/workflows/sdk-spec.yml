name: SDK Spec

on:
  pull_request:
    paths:
      - "packages/sdk-spec/**"
      - "docs/api/openapi.yaml"
      - "docs/api/openapi.json"
      - "docs/architecture/treedb-sdk-spec-implementation-plan.md"
      - ".github/workflows/sdk-spec.yml"
  push:
    branches: [main]
    paths:
      - "packages/sdk-spec/**"
      - "docs/api/openapi.yaml"
      - "docs/api/openapi.json"
      - "docs/architecture/treedb-sdk-spec-implementation-plan.md"
      - ".github/workflows/sdk-spec.yml"

jobs:
  validate-sdk-spec:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/sdk-spec/package-lock.json

      - run: npm ci
        working-directory: packages/sdk-spec

      - run: npm run validate
        working-directory: packages/sdk-spec

      - run: npm run check-openapi-coverage
        working-directory: packages/sdk-spec

      - run: npm run check-sdk-manifests
        working-directory: packages/sdk-spec

      - run: npm run render-capability-matrix
        working-directory: packages/sdk-spec

      - run: npm test
        working-directory: packages/sdk-spec
