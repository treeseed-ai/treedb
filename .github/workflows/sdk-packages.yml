name: SDK Packages

on:
  pull_request:
    paths:
      - "packages/sdk-spec/**"
      - "packages/ts-sdk/**"
      - "packages/python-sdk/**"
      - "packages/rust-sdk/**"
      - "packages/elixir-sdk/**"
      - "docs/api/openapi.yaml"
      - "docs/api/openapi.json"
      - ".github/workflows/sdk-packages.yml"
  push:
    branches: [main]
    paths:
      - "packages/sdk-spec/**"
      - "packages/ts-sdk/**"
      - "packages/python-sdk/**"
      - "packages/rust-sdk/**"
      - "packages/elixir-sdk/**"
      - "docs/api/openapi.yaml"
      - "docs/api/openapi.json"
      - ".github/workflows/sdk-packages.yml"

jobs:
  typescript-sdk:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: packages/ts-sdk/package-lock.json

      - run: npm ci
        working-directory: packages/ts-sdk

      - run: npm run treedb:check-generated
        working-directory: packages/ts-sdk

      - run: npm run build
        working-directory: packages/ts-sdk

      - run: npm run test:treedb-unit
        working-directory: packages/ts-sdk

      - run: npm run test:treedb-integration
        working-directory: packages/ts-sdk

      - run: npm test
        working-directory: packages/ts-sdk

  python-sdk:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/python-sdk/pyproject.toml

      - run: python -m pip install --upgrade pip
        working-directory: packages/python-sdk

      - run: python -m pip install -e ".[dev]"
        working-directory: packages/python-sdk

      - run: python scripts/check_treedb_generated_types.py
        working-directory: packages/python-sdk

      - run: python -m build
        working-directory: packages/python-sdk

      - run: python -m pytest tests/unit tests/adapters tests/generated tests/integration
        working-directory: packages/python-sdk

      - run: python -m pytest
        working-directory: packages/python-sdk

  rust-sdk:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/rust-sdk/target
          key: ${{ runner.os }}-rust-sdk-${{ hashFiles('packages/rust-sdk/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-sdk-

      - run: node scripts/check_treedb_generated_types.mjs
        working-directory: packages/rust-sdk

      - run: cargo fmt --all -- --check
        working-directory: packages/rust-sdk

      - run: cargo clippy --all-targets -- -D warnings
        working-directory: packages/rust-sdk

      - run: cargo test
        working-directory: packages/rust-sdk

  elixir-sdk:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17.3"

      - uses: actions/cache@v4
        with:
          path: |
            packages/elixir-sdk/deps
            packages/elixir-sdk/_build
          key: ${{ runner.os }}-elixir-sdk-${{ hashFiles('packages/elixir-sdk/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-elixir-sdk-

      - run: mix deps.get
        working-directory: packages/elixir-sdk

      - run: mix run scripts/check_treedb_generated_types.exs
        working-directory: packages/elixir-sdk

      - run: mix format --check-formatted
        working-directory: packages/elixir-sdk

      - run: mix test
        working-directory: packages/elixir-sdk
