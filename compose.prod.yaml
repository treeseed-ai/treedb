services:
  treedb-api:
    build:
      context: .
      target: prod
    environment:
      PHX_SERVER: "true"
      PHX_HOST: 0.0.0.0
      PORT: "4000"
      TREEDB_DATA_DIR: /var/lib/treedb
      TREEDB_AUTH_MODE: connected
      TREEDB_REGISTRY_MODE: connected
      TREEDB_NODE_ID: node_local
    ports:
      - "4000:4000"
    volumes:
      - treedb-data:/var/lib/treedb
    restart: unless-stopped

volumes:
  treedb-data:
